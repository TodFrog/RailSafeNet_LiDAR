program: train_SegFormer_transfer_learning.py
project: RailSafeNet-TransferLearning-AGGRESSIVE
method: bayes
metric:
  name: val_rail_iou
  goal: maximize

parameters:
  # AGGRESSIVE optimization for maximum speed
  batch_size:
    values: [24, 28, 32]     # MUCH LARGER batch sizes
  image_size:
    values: [512, 576]       # SMALLER image sizes for speed
  num_epochs:
    values: [10, 15]         # SHORTER epochs for fast iteration

  # Learning rates - simplified ranges for speed
  lr_backbone:
    values: [1e-5, 5e-5, 1e-4]
  lr_decoder:
    values: [1e-4, 5e-4, 1e-3]
  lr_new_layers:
    values: [5e-4, 1e-3, 5e-3]

  # Regularization
  weight_decay:
    values: [1e-4, 1e-3]

  # Training phases - reduced for speed
  freeze_epochs:
    values: [3, 5]

# Very aggressive early termination for speed
early_terminate:
  type: hyperband
  min_iter: 3