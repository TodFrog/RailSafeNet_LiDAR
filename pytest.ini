[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --cov=src --cov-report=html --cov-report=term-missing
markers =
    unit: Unit tests
    integration: Integration tests
    benchmark: Performance benchmark tests
    gpu: Tests requiring GPU/CUDA
    phase3: Phase 3 parallel processing tests
    phase4: Phase 4 temporal tracking tests
    phase5: Phase 5 IMM filter tests
