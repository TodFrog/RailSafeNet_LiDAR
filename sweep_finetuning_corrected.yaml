program: train_SegFormer_transfer_production.py
method: bayes
metric:
  name: val_iou
  goal: maximize

parameters:
  batch_size:
    values: [2, 4, 6, 8]
  image_size:
    values: [384, 512, 640]
  lr_backbone:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.0001
  lr_decoder:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001
  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.001
  augment:
    values: [true, false]
  num_epochs:
    value: 20
  max_samples:
    values: [2000, 4000, "null"]
  num_workers:
    values: [1, 2, 4]
  use_wandb:
    value: true

project: RailSafeNet-TransferLearning-Production

early_terminate:
  type: hyperband
  min_iter: 5
  eta: 3