program: train_SegFormer_transfer_learning.py
project: RailSafeNet-TransferLearning-BALANCED
method: bayes
metric:
  name: val_rail_iou
  goal: maximize

parameters:
  # BALANCED optimization for speed vs memory
  batch_size:
    values: [20, 24, 28]     # Safe range avoiding OOM
  image_size:
    values: [512, 576]       # Smaller sizes for speed
  num_epochs:
    values: [12, 15]         # Reduced epochs for fast testing

  # Learning rates - focused ranges
  lr_backbone:
    values: [1e-5, 5e-5, 1e-4]
  lr_decoder:
    values: [1e-4, 5e-4]
  lr_new_layers:
    values: [5e-4, 1e-3]

  # Regularization
  weight_decay:
    values: [1e-4, 1e-3]

  # Training phases
  freeze_epochs:
    values: [3, 5]

# Aggressive early termination for fast iteration
early_terminate:
  type: hyperband
  min_iter: 5