# sweep_finetuning.yaml (Final Corrected Version for latest wandb)
program: train_SegFormer_transfer_production.py
method: bayes
metric:
  name: val_iou
  goal: maximize
parameters:
  batch_size:
    values: [2, 4, 6, 8]
  image_size:
    values: [384, 512, 640]
  lr_backbone:
    distribution: log_uniform
    min: 1e-6
    max: 1e-4
  lr_decoder:
    distribution: log_uniform
    min: 1e-5
    max: 1e-3
  weight_decay:
    distribution: log_uniform
    min: 1e-5
    max: 1e-3
  augment:
    values: [true, false]
  num_epochs:
    value: 20
  max_samples:
    values: [2000, 4000, null]
  num_workers:
    values: [1, 2, 4]
  use_wandb:
    value: true

command:
  - ${env}
  - /bin/bash
  - -c
  - |
    python ${program} \
      --batch_size ${batch_size} \
      --image_size ${image_size} \
      --lr_backbone ${lr_backbone} \
      --lr_decoder ${lr_decoder} \
      --weight_decay ${weight_decay} \
      --num_epochs ${num_epochs} \
      --num_workers ${num_workers} \
      $(if [ "${augment}" = "true" ]; then echo "--augment"; fi) \
      $(if [ "${use_wandb}" = "true" ]; then echo "--use_wandb"; fi) \
      $(if [ "${max_samples}" != "null" ]; then echo "--max_samples ${max_samples}"; fi)

project: RailSafeNet-TransferLearning-Production
early_terminate:
  type: hyperband
  min_iter: 5
  eta: 3