# sweep.yaml
program: train_SegFormer_B3_improved.py  # 실행할 파이썬 파일 이름
method: bayes                            # 베이지안 최적화 탐색 기법 사용
metric:
  name: val_rail_iou                     # 최적화 목표 지표 (validation rail IoU)
  goal: maximize                         # 목표 지표를 최대화하는 방향으로 탐색
parameters:
  # --- 고정할 하이퍼파라미터 ---
  image_size:
    value: 512
  epochs:
    value: 30
  batch_size:
    value: 2

  # --- 탐색할 하이퍼파라미터 ---
  learning_rate:
    distribution: log_uniform_values
    min: 1.0e-5  # 0.00001
    max: 1.0e-3  # 0.001
    
  optimizer:
    values: ['adamw', 'adam'] # AdamW와 Adam 두 가지 옵티마이저를 테스트

  weight_decay:
    distribution: uniform
    min: 0.0
    max: 0.1
  
  warmup_epochs:
    distribution: int_uniform
    min: 1
    max: 5